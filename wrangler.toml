name = "sadec-marketing-hub"
compatibility_date = "2024-01-01"

[site]
bucket = "."

# Cache Headers Configuration
[assets]
directory = "."

# Static assets - 1 year cache with fingerprint
[[assets.rules]]
pattern = ".*\\.(js|css|woff2|png|jpg|jpeg|gif|svg|ico|webp)$"
cache_control = { max_age = 31536000, bypass_cache = false }

# HTML files - no cache or short cache for quick updates
[[assets.rules]]
pattern = ".*\\.html$"
cache_control = { max_age = 3600, bypass_cache = false }

# JSON manifests - short cache
[[assets.rules]]
pattern = ".*\\.(json|xml)$"
cache_control = { max_age = 86400, bypass_cache = false }
