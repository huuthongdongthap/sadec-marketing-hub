        /* M3 Expressive Override */
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--md-sys-color-surface);
            overflow: hidden;
            font-family: var(--font-brand);
        }

        .auth-container {
            width: 100%;
            max-width: 520px;
            padding: 20px;
            z-index: 10;
        }

        .md-field-wrapper {
            margin-bottom: 20px;
        }

        .md-field-wrapper label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--md-sys-color-on-surface-variant);
        }

        .md-field-wrapper input {
            width: 100%;
            padding: 16px;
            border-radius: var(--shape-small);
            border: 1px solid var(--md-sys-color-outline);
            background: var(--md-sys-color-surface-container-highest);
            color: var(--md-sys-color-on-surface);
            font-size: 16px;
            transition: all 0.2s ease;
        }

        .md-field-wrapper input:focus {
            border-color: var(--md-exp-primary);
            box-shadow: 0 0 0 2px rgba(233, 30, 99, 0.2);
            outline: none;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 500px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        /* Role Selector Cards */
        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .role-option input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .role-option label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 20px 12px;
            background: var(--md-sys-color-surface-container-high);
            border: 2px solid transparent;
            border-radius: var(--shape-medium);
            cursor: pointer;
            transition: all 0.2s var(--motion-spring-out);
            text-align: center;
        }

        .role-option label:hover {
            background: var(--md-sys-color-surface-container-highest);
            transform: translateY(-2px);
        }

        .role-option input:checked+label {
            border-color: var(--md-exp-primary);
            background: var(--md-exp-primary-container);
            color: var(--md-exp-on-primary-container);
        }

        .role-icon {
            font-size: 28px;
        }

        .role-name {
            font-weight: 600;
            font-size: 13px;
        }

        .role-desc {
            font-size: 11px;
            opacity: 0.8;
        }

        /* Dialogs */
        .message {
            padding: 12px;
            border-radius: var(--shape-small);
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .message.visible {
            display: block;
            animation: shake 0.4s ease;
        }

        .message--error {
            background: var(--md-sys-color-error-container);
            color: var(--md-sys-color-on-error-container);
        }

        .message--success {
            background: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
        }

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script type="module">
        // ========== REGISTER LOGIC ==========
        const registerForm = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('visible');
            successMessage.classList.remove('visible');
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.classList.add('visible');
            errorMessage.classList.remove('visible');
        }

        function hideMessages() {
            errorMessage.classList.remove('visible');
            successMessage.classList.remove('visible');
        }

        function setLoading(isLoading) {
            registerBtn.disabled = isLoading;
            const btnText = registerBtn.querySelector('.btn-text');
            const btnLoader = registerBtn.querySelector('.btn-loader');

            if (btnText) btnText.style.display = isLoading ? 'none' : 'inline';
            if (btnLoader) btnLoader.style.display = isLoading ? 'inline-flex' : 'none';
        }

        // Phone formatting
        document.getElementById('phone').addEventListener('input', function (e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 4) value = value.slice(0, 4) + ' ' + value.slice(4);
            if (value.length > 8) value = value.slice(0, 8) + ' ' + value.slice(8);
            e.target.value = value.slice(0, 12);
        });

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();

            const fullName = document.getElementById('fullName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const role = document.querySelector('input[name="role"]:checked').value;

            if (!fullName || !email || !password) {
                showError('Vui lòng điền đầy đủ thông tin');
                return;
            }

            if (password.length < 6) {
                showError('Mật khẩu phải có ít nhất 6 ký tự');
                return;
            }

            setLoading(true);

            try {
                const result = await Auth.Actions.signUp(email, password, {
                    fullName,
                    phone,
                    role
                });

                if (result.success) {
                    if (result.isDemo) {
                        // Demo mode - redirect immediately
                        showSuccess('Đăng ký thành công! Đang chuyển hướng...');
                        setTimeout(() => {
                            // Check for redirect param
                            const urlParams = new URLSearchParams(window.location.search);
                            const redirectParam = urlParams.get('redirect');

                            if (redirectParam) {
                                window.location.href = decodeURIComponent(redirectParam);
                            } else {
                                window.location.href = Auth.Guards.getRedirectUrl();
                            }
                        }, 1500);
                    } else {
                        // Real Supabase - wait for email confirmation
                        showSuccess(result.message || 'Đăng ký thành công! Kiểm tra email để xác nhận.');
                    }
                } else {
                    showError(result.error || 'Có lỗi xảy ra');
                }
            } catch (err) {
                // console.error('Register error:', err);
                showError('Có lỗi xảy ra, vui lòng thử lại');
            } finally {
                setLoading(false);
            }
        });

        // Redirect if already logged in
        Auth.Guards.redirectIfAuthenticated();

        // Update login link with current query params
        const loginLink = document.getElementById('loginLink');
        if (window.location.search) {
            loginLink.href += window.location.search;
        }

        // Zalo button (Coming Soon)
        document.getElementById('zaloBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            const result = await Auth.Actions.signInWithZalo();
            if (result.isPlaceholder) {
                alert('🚀 ' + result.error + '\n\nTính năng đăng ký bằng Zalo sẽ được cập nhật sớm!\nHiện tại bạn có thể đăng ký bằng email.');
            }
        });
    </script>
