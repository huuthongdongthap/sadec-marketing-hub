name = "sadec-marketing-hub-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── R2 Storage (thay Supabase Storage) ──────────────────────────────
[[r2_buckets]]
binding = "ASSETS_BUCKET"
bucket_name = "sadec-assets"

# ── D1 Database (thay Supabase Postgres data tables) ─────────────────
[[d1_databases]]
binding = "DB"
database_name = "sadec-db"
database_id = "YOUR_D1_DATABASE_ID"  # Fill after: wrangler d1 create sadec-db

# ── Environment Variables ────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"
ALLOWED_ORIGIN = "https://sadec-marketing-hub.pages.dev"
APP_URL = "https://sadec-marketing-hub.pages.dev"

# Secrets (set via: wrangler secret put <NAME>)
# SUPABASE_URL
# SUPABASE_JWT_SECRET       ← verify auth tokens from frontend
# VNPAY_TMN_CODE
# VNPAY_SECRET_KEY
# MOMO_PARTNER_CODE
# MOMO_ACCESS_KEY
# MOMO_SECRET_KEY
# PAYOS_CLIENT_ID
# PAYOS_API_KEY
# PAYOS_CHECKSUM_KEY
# ZALO_OA_SECRET

# ── Local Dev ────────────────────────────────────────────────────────
[dev]
port = 8787
local_protocol = "http"

# ── Routes ───────────────────────────────────────────────────────────
[[routes]]
pattern = "sadec-marketing-hub.pages.dev/api/*"
zone_name = "pages.dev"
