name = "sadec-marketing-hub-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
account_id = "b69fee03bdd94234eea8e4114cfc36ab"

# ── D1 Database (thay Supabase Postgres data tables) ─────────────────
[[d1_databases]]
binding = "DB"
database_name = "sadec-db"
database_id = "0ec55f8d-b366-4530-a6e7-e5d67ac95830"

# ── R2 Storage — uncomment after enabling R2 in Cloudflare dashboard ──
# [[r2_buckets]]
# binding = "ASSETS_BUCKET"
# bucket_name = "sadec-assets"

# ── Environment Variables ────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"
ALLOWED_ORIGIN = "https://sadec-marketing-hub.pages.dev"
APP_URL = "https://sadec-marketing-hub.pages.dev"

# Secrets (set via: wrangler secret put <NAME>)
# SUPABASE_URL
# SUPABASE_JWT_SECRET
# VNPAY_TMN_CODE
# VNPAY_SECRET_KEY
# MOMO_PARTNER_CODE
# MOMO_ACCESS_KEY
# MOMO_SECRET_KEY
# PAYOS_CLIENT_ID
# PAYOS_API_KEY
# PAYOS_CHECKSUM_KEY
# ZALO_OA_SECRET

# ── Local Dev ────────────────────────────────────────────────────────
[dev]
port = 8787
local_protocol = "http"
