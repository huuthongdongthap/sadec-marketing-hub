    <script>
        // ========== INLINE DEMO_USERS FALLBACK (when Auth is undefined) ==========
        const DEMO_USERS = {
            'admin@mekongmarketing.com': { password: 'admin123', role: 'super_admin', name: 'Admin', redirect: '/admin/dashboard.html' },
            'manager@mekongmarketing.com': { password: 'manager123', role: 'manager', name: 'Manager', redirect: '/admin/dashboard.html' },
            'creator@mekongmarketing.com': { password: 'creator123', role: 'content_creator', name: 'Creator', redirect: '/admin/dashboard.html' },
            'client@mekongmarketing.com': { password: 'client123', role: 'client', name: 'Client Demo', redirect: '/portal/dashboard.html' },
            'affiliate@mekongmarketing.com': { password: 'affiliate123', role: 'affiliate', name: 'Affiliate Demo', redirect: '/affiliate/dashboard.html' }
        };

        // ========== LOGIN LOGIC ==========
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');

        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('visible');
        }

        function hideError() {
            errorMessage.classList.remove('visible');
        }

        function setLoading(isLoading) {
            loginBtn.disabled = isLoading;
            const btnText = loginBtn.querySelector('.btn-text');
            const btnLoader = loginBtn.querySelector('.btn-loader');

            if (btnText) btnText.style.display = isLoading ? 'none' : 'inline';
            if (btnLoader) btnLoader.style.display = isLoading ? 'inline-flex' : 'none';
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const email = emailInput.value.trim().toLowerCase();
            const password = passwordInput.value;

            if (!email || !password) {
                showError('Vui lòng điền đầy đủ thông tin');
                return;
            }

            setLoading(true);

            try {
                // Use centralized Auth action with fallback to inline DEMO_USERS
                let result;
                if (window.Auth && window.Auth.Actions) {
                    result = await Auth.Actions.signIn(email, password);
                } else {
                    // Fallback to inline DEMO_USERS when Auth module not available
                    window.location.hostname === 'localhost' && console.warn('Auth module not available, using inline DEMO_USERS');
                    const demoUser = DEMO_USERS[email];
                    if (demoUser && demoUser.password === password) {
                        result = { success: true, user: { email, role: demoUser.role, name: demoUser.name } };
                    } else {
                        result = { success: false, error: 'Email hoặc mật khẩu không đúng' };
                    }
                }

                if (result.success) {
                    // Check for redirect param
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirectParam = urlParams.get('redirect');

                    if (redirectParam) {
                        window.location.href = decodeURIComponent(redirectParam);
                    } else {
                        // Default role-based redirect with fallback
                        const redirectUrl = (window.Auth && window.Auth.Guards)
                            ? Auth.Guards.getRedirectUrl()
                            : DEMO_USERS[email]?.redirect || '/';
                        window.location.href = redirectUrl;
                    }
                } else {
                    showError(result.error || 'Email hoặc mật khẩu không đúng');
                }

            } catch (err) {
                window.location.hostname === 'localhost' && console.error('Login error:', err);
                showError('Có lỗi xảy ra: ' + (err.message || 'Không xác định'));
            } finally {
                setLoading(false);
            }
        });

        // Forgot password
        document.getElementById('forgotPassword').addEventListener('click', (e) => {
            e.preventDefault();
            alert('Demo Mode: Liên hệ admin để reset mật khẩu.\n\nDemo accounts:\n• admin@mekongmarketing.com / admin123\n• manager@mekongmarketing.com / manager123\n• creator@mekongmarketing.com / creator123\n• client@mekongmarketing.com / client123\n• affiliate@mekongmarketing.com / affiliate123');
        });

        // Check if already logged in - wrap in try-catch for when Auth is undefined
        try {
            if (window.Auth && window.Auth.Guards) {
                Auth.Guards.redirectIfAuthenticated();
            }
        } catch (e) {
            window.location.hostname === 'localhost' && console.warn('Auth.Guards unavailable, skipping redirect check');
        }

        // Update register link with current query params
        const registerLink = document.getElementById('registerLink');
        if (window.location.search) {
            registerLink.href += window.location.search;
        }

        // Prefill demo email for convenience
        // emailInput.value = 'admin@mekongmarketing.com';

        // Zalo button (Coming Soon) - wrap in try-catch for safety
        document.getElementById('zaloBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            try {
                const result = await Auth.Actions.signInWithZalo();
                if (result.isPlaceholder) {
                    alert('🚀 ' + result.error + '\n\nTính năng đăng nhập bằng Zalo sẽ được cập nhật sớm!\nHiện tại bạn có thể đăng nhập bằng email.');
                }
            } catch (err) {
                window.location.hostname === 'localhost' && console.error('Zalo login error:', err);
                alert('💬 Đăng nhập bằng Zalo sẽ được cập nhật sớm!\nHiện tại bạn có thể đăng nhập bằng email.');
            }
        });
    </script>
