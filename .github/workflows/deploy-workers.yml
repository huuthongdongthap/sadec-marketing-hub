name: Deploy Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - 'workers/**'
      - '.github/workflows/deploy-workers.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Workers API
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: workers

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: workers/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Run D1 migrations (production)
        run: |
          wrangler d1 execute sadec-db \
            --remote \
            --file=migrations/0001_schema.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers
          command: deploy --minify

      - name: Smoke test
        run: |
          echo "Checking Workers health..."
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://sadec-marketing-hub-api.YOUR_ACCOUNT.workers.dev/api/health")
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed!"
            exit 1
          fi
          echo "Workers deployed successfully!"
