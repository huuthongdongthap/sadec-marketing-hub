name: CI — Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # Security — No hardcoded secrets
      - name: Check for hardcoded secrets
        run: |
          echo "🔍 Scanning for hardcoded Supabase keys..."
          if grep -r "eyJhbGciOiJIUzI1NiIs" --include="*.html" --include="*.js" \
            --exclude-dir=node_modules --exclude="mekong-env.js" --exclude="supabase-config.js" .; then
            echo "❌ Found hardcoded Supabase keys!"
            exit 1
          fi
          echo "✅ No hardcoded secrets found"

      # Hygiene — No .bak files
      - name: Check for backup files
        run: |
          echo "🧹 Checking for .bak files..."
          BAK_COUNT=$(find . -name "*.bak" -not -path "./node_modules/*" | wc -l)
          if [ "$BAK_COUNT" -gt 0 ]; then
            echo "❌ Found $BAK_COUNT .bak files:"
            find . -name "*.bak" -not -path "./node_modules/*"
            exit 1
          fi
          echo "✅ No .bak files found"

      # Playwright Tests
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npx playwright test tests/smoke-all-pages.spec.ts --project=chromium
        env:
          CI: true

      - name: Run SEO validation
        run: npx playwright test tests/seo-validation.spec.ts --project=chromium
        env:
          CI: true

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
