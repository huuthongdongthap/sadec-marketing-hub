    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script type="module">
        const resetForm = document.getElementById('resetForm');
        const submitBtn = document.getElementById('submitBtn');
        const errorMessage = document.getElementById('errorMessage');
        const formState = document.getElementById('formState');
        const successState = document.getElementById('successState');

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('visible');
        }

        function hideError() {
            errorMessage.classList.remove('visible');
        }

        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            const btnText = submitBtn.querySelector('.btn-text');
            const btnLoader = submitBtn.querySelector('.btn-loader');

            if (btnText) btnText.style.display = isLoading ? 'none' : 'inline';
            if (btnLoader) btnLoader.style.display = isLoading ? 'inline-flex' : 'none';
        }

        function showSuccess() {
            formState.classList.add('hidden');
            successState.classList.add('visible');
        }

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const email = document.getElementById('email').value.trim();

            if (!email) {
                showError('Vui lòng nhập email');
                return;
            }

            setLoading(true);

            try {
                const result = await Auth.Actions.resetPassword(email);

                if (result.success) {
                    showSuccess();
                } else {
                    // For security, always show success even if email doesn't exist
                    // But if it's a demo mode message, show it
                    if (result.error && result.error.includes('Demo')) {
                        showError(result.error);
                    } else {
                        showSuccess();
                    }
                }
            } catch (err) {
                // window.location.hostname === 'localhost' && console.error('Reset error:', err);
                showError('Có lỗi xảy ra, vui lòng thử lại');
            } finally {
                setLoading(false);
            }
        });

        // Redirect if already logged in
        Auth.Guards.redirectIfAuthenticated();
    </script>
