<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên Mật Khẩu | Mekong Marketing</title>
    <meta name="description" content="Khôi phục mật khẩu tài khoản Mekong Marketing.">
    <meta property="og:title" content="Quên Mật Khẩu | Mekong Marketing">
    <meta property="og:description" content="Khôi phục mật khẩu tài khoản Mekong Marketing.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sadecmarketinghub.com/forgot-password.html">
    <meta property="og:image" content="https://sadecmarketinghub.com/favicon.png">
    <link rel="canonical" href="https://sadecmarketinghub.com/forgot-password.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@700;900&display=swap"
        rel="stylesheet">


    <link rel="stylesheet" href="assets/css/m3-agency.css">
    <link rel="stylesheet" href="assets/css/admin-unified.css">
    <style>
        /* M3 Expressive Override */
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--md-sys-color-surface);
            overflow: hidden;
            font-family: var(--font-brand);
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            z-index: 10;
        }

        .md-field-wrapper {
            margin-bottom: 24px;
        }

        .md-field-wrapper label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--md-sys-color-on-surface-variant);
        }

        .md-field-wrapper input {
            width: 100%;
            padding: 16px;
            border-radius: var(--shape-small);
            border: 1px solid var(--md-sys-color-outline);
            background: var(--md-sys-color-surface-container-highest);
            color: var(--md-sys-color-on-surface);
            font-size: 16px;
            transition: all 0.2s ease;
        }

        .md-field-wrapper input:focus {
            border-color: var(--md-exp-primary);
            box-shadow: 0 0 0 2px rgba(233, 30, 99, 0.2);
            outline: none;
        }

        /* Dialogs & States */
        .form-state,
        .success-state {
            transition: all 0.3s ease;
        }

        .form-state.hidden {
            display: none;
        }

        .success-state {
            display: none;
            text-align: center;
        }

        .success-state.visible {
            display: block;
            animation: scaleIn 0.4s var(--motion-spring-bouncy);
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.9);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .message {
            padding: 12px;
            border-radius: var(--shape-small);
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .message.visible {
            display: block;
            animation: shake 0.4s ease;
        }

        .message--error {
            background: var(--md-sys-color-error-container);
            color: var(--md-sys-color-on-error-container);
        }
    </style>
</head>

<body>
    <div class="gradient-mesh-exp"></div>
    <div class="hero-particles"></div>

    <div class="auth-container">
        <div class="card-exp glass-exp reveal-exp-scale visible">

            <div style="text-align: center; margin-bottom: 32px;">
                <div class="card-exp__icon" style="margin: 0 auto 16px; width: 64px; height: 64px; font-size: 32px;">
                    🔐
                </div>
                <h1 style="font-size: 22px; font-weight: 800; margin-bottom: 8px;" class="gradient-text-exp">
                    KHÔI PHỤC TÀI KHOẢN
                </h1>
                <p style="color: var(--md-sys-color-on-surface-variant); font-size: 14px;">
                    Nhập email để đặt lại mật khẩu của bạn
                </p>
            </div>

            <!-- Form State -->
            <div class="form-state" id="formState">
                <form id="resetForm">
                    <div class="md-field-wrapper">
                        <label>📧 Email đã đăng ký</label>
                        <input type="email" id="email" placeholder="email@example.com" required>
                    </div>

                    <div class="message message--error" id="errorMessage"></div>

                    <button type="submit" class="btn-exp btn-exp-filled" id="submitBtn"
                        style="width: 100%; justify-content: center;">
                        <span class="btn-text">📨 Gửi Link Đặt Lại</span>
                        <span class="btn-loader" style="display: none;">⏳ Đang gửi...</span>
                    </button>
                </form>

                <div style="text-align: center; margin-top: 24px;">
                    <a href="login.html"
                        style="color: var(--md-sys-color-on-surface-variant); text-decoration: none; font-size: 14px;">
                        ← Quay lại <strong>Đăng nhập</strong>
                    </a>
                </div>
            </div>

            <!-- Success State -->
            <div class="success-state" id="successState">
                <div style="font-size: 64px; margin-bottom: 20px;">✅</div>
                <h2 style="font-size: 20px; font-weight: 700; color: var(--md-exp-primary); margin-bottom: 12px;">
                    Đã Gửi Email!
                </h2>
                <p
                    style="color: var(--md-sys-color-on-surface-variant); font-size: 14px; line-height: 1.6; margin-bottom: 24px;">
                    Vui lòng kiểm tra hộp thư (bao gồm cả mục Spam) để nhận liên kết đặt lại mật khẩu.
                </p>

                <a href="login.html" class="btn-exp btn-exp-outlined"
                    style="width: 100%; justify-content: center; text-decoration: none;">
                    ← Quay lại Đăng nhập
                </a>
            </div>

        </div>

        <p style="text-align: center; margin-top: 24px; color: rgba(255,255,255,0.6); font-size: 12px;">
            © 2026 Mekong Marketing.
        </p>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="supabase-config.js"></script>
    <script type="module" src="auth.js"></script>
    <script type="module" src="material-interactions.js"></script>
    <script>
        const resetForm = document.getElementById('resetForm');
        const submitBtn = document.getElementById('submitBtn');
        const errorMessage = document.getElementById('errorMessage');
        const formState = document.getElementById('formState');
        const successState = document.getElementById('successState');

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('visible');
        }

        function hideError() {
            errorMessage.classList.remove('visible');
        }

        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            const btnText = submitBtn.querySelector('.btn-text');
            const btnLoader = submitBtn.querySelector('.btn-loader');

            if (btnText) btnText.style.display = isLoading ? 'none' : 'inline';
            if (btnLoader) btnLoader.style.display = isLoading ? 'inline-flex' : 'none';
        }

        function showSuccess() {
            formState.classList.add('hidden');
            successState.classList.add('visible');
        }

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const email = document.getElementById('email').value.trim();

            if (!email) {
                showError('Vui lòng nhập email');
                return;
            }

            setLoading(true);

            try {
                const result = await Auth.Actions.resetPassword(email);

                if (result.success) {
                    showSuccess();
                } else {
                    // For security, always show success even if email doesn't exist
                    // But if it's a demo mode message, show it
                    if (result.error && result.error.includes('Demo')) {
                        showError(result.error);
                    } else {
                        showSuccess();
                    }
                }
            } catch (err) {
                // console.error('Reset error:', err);
                showError('Có lỗi xảy ra, vui lòng thử lại');
            } finally {
                setLoading(false);
            }
        });

        // Redirect if already logged in
        Auth.Guards.redirectIfAuthenticated();
    </script>
</body>

</html>
