    <h1>🍞 Toast Notifications Test</h1>
    <p>Test page for toast notification system</p>

    <div class="test-section">
        <h2>Basic Toasts</h2>
        <div class="button-group">
            <button class="btn-success" onclick="Toast.success('Operation completed successfully!')">Success</button>
            <button class="btn-error" onclick="Toast.error('Something went wrong!')">Error</button>
            <button class="btn-warning" onclick="Toast.warning('Please check your input')">Warning</button>
            <button class="btn-info" onclick="Toast.info('New update available')">Info</button>
        </div>
    </div>

    <div class="test-section">
        <h2>Toast with Title</h2>
        <div class="button-group">
            <button class="btn-success" onclick="Toast.show('File uploaded successfully', { type: 'success', title: 'Upload Complete' })">
                Success + Title
            </button>
            <button class="btn-error" onclick="Toast.show('Connection failed', { type: 'error', title: 'Network Error' })">
                Error + Title
            </button>
        </div>
    </div>

    <div class="test-section">
        <h2>Toast with Actions</h2>
        <div class="button-group">
            <button class="btn-info" onclick="showActionToast()">Show Action Toast</button>
        </div>
    </div>

    <div class="test-section">
        <h2>Multiple Toasts</h2>
        <div class="button-group">
            <button class="btn-secondary" onclick="showMultiple()">Show 3 Toasts</button>
        </div>
    </div>

    <div class="test-section">
        <h2>Clear All</h2>
        <div class="button-group">
            <button class="btn-secondary" onclick="Toast.clear()">Clear All Toasts</button>
        </div>
    </div>

    <script>
        function showActionToast() {
            Toast.show('New message received', {
                type: 'info',
                title: 'Notification',
                duration: 8000,
                actions: [
                    { id: 'view', label: 'View', primary: true },
                    { id: 'dismiss', label: 'Dismiss', primary: false }
                ]
            });
        }

        function showMultiple() {
            Toast.success('First toast');
            setTimeout(() => Toast.info('Second toast'), 300);
            setTimeout(() => Toast.warning('Third toast'), 600);
        }
    </script>
