<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quality Dashboard - Sa Đéc Marketing Hub</title>

  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined" rel="stylesheet">

  <link rel="stylesheet" href="/assets/css/m3-agency.css">
  <link rel="stylesheet" href="/assets/css/agency-2026.css">
  <link rel="stylesheet" href="/assets/css/admin-dashboard.css">

  <style>
    :root {
      --primary: #00e5ff;
      --success: #00e676;
      --warning: #ff9100;
      --error: #ff1744;
      --bg-primary: #0f0f0f;
      --bg-secondary: #1a1a1a;
      --bg-card: rgba(255, 255, 255, 0.05);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --border: rgba(255, 255, 255, 0.1);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      margin: 0;
      padding: 20px;
    }

    .dashboard-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .dashboard-header h1 {
      font-size: 2rem;
      margin: 0 0 10px;
      background: linear-gradient(135deg, var(--primary), var(--success));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .metric-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      backdrop-filter: blur(10px);
    }

    .metric-card h3 {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin: 0 0 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .metric-value {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .metric-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .status-pass { background: rgba(0, 230, 118, 0.15); color: var(--success); }
    .status-warning { background: rgba(255, 145, 0, 0.15); color: var(--warning); }
    .status-error { background: rgba(255, 23, 68, 0.15); color: var(--error); }

    .action-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .action-section h2 {
      font-size: 1.25rem;
      margin: 0 0 20px;
    }

    .action-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #00b8cc);
      color: #000;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 229, 255, 0.3);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .material-symbols-outlined { font-size: 20px; }

    .progress-bar {
      height: 8px;
      background: var(--bg-secondary);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 12px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--success));
      transition: width 0.3s;
      border-radius: 4px;
    }

    .log-output {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      font-family: 'Consolas', monospace;
      font-size: 0.875rem;
      max-height: 300px;
      overflow-y: auto;
      display: none;
    }

    .log-output.active { display: block; }
    .log-success { color: var(--success); }
    .log-error { color: var(--error); }
    .log-info { color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="dashboard-header">
    <h1>Quality Dashboard</h1>
    <p style="color: var(--text-secondary);">Sa Đéc Marketing Hub - Real-time Quality Metrics</p>
  </div>

  <div class="metrics-grid">
    <div class="metric-card">
      <h3>Security Headers</h3>
      <div class="metric-value" id="security-score">10/10</div>
      <span class="metric-status status-pass">
        <span class="material-symbols-outlined">check_circle</span>
        PASS
      </span>
      <div class="progress-bar">
        <div class="progress-fill" style="width: 100%"></div>
      </div>
    </div>

    <div class="metric-card">
      <h3>Code Quality</h3>
      <div class="metric-value" id="console-count">0</div>
      <span class="metric-status status-warning">
        <span class="material-symbols-outlined">warning</span>
        console.log
      </span>
      <p style="color: var(--text-secondary); font-size: 0.875rem; margin-top: 8px;">
        TODO/FIXME: <span id="todo-count">0</span>
      </p>
    </div>

    <div class="metric-card">
      <h3>Accessibility</h3>
      <div class="metric-value" id="a11y-count">0</div>
      <span class="metric-status status-pass">
        <span class="material-symbols-outlined">accessible</span>
        aria-labels
      </span>
    </div>

    <div class="metric-card">
      <h3>Test Coverage</h3>
      <div class="metric-value" id="test-count">0</div>
      <span class="metric-status status-pass">
        <span class="material-symbols-outlined">fact_check</span>
        spec files
      </span>
    </div>
  </div>

  <div class="action-section">
    <h2>Auto-fix Actions</h2>
    <div class="action-grid">
      <button class="btn btn-primary" onclick="runCleanup()">
        <span class="material-symbols-outlined">cleaning_services</span>
        Cleanup console.log
      </button>
      <button class="btn btn-primary" onclick="runSecurityAudit()">
        <span class="material-symbols-outlined">security</span>
        Run Security Audit
      </button>
      <button class="btn btn-primary" onclick="refreshMetrics()">
        <span class="material-symbols-outlined">refresh</span>
        Refresh Metrics
      </button>
    </div>
    <div id="log-output" class="log-output"></div>
  </div>

  <script type="module" src="quality-dashboard.js"></script>
</body>
</html>
