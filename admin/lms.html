<body>
  <a href="#main" class="skip-link" style="position:absolute;left:-9999px;">Skip to main content</a>
    <div class="admin-layout">
        <!-- Sidebar -->
        <sadec-sidebar active="lms"></sadec-sidebar>

        <!-- Main Content -->
        <main class="main-content">
  <main id="main" role="main" class="sr-main">
            <header class="dashboard-header">
                <div class="container">
                    <h1 class="display-small">🎓 LMS Training</h1>
                    <p class="body-large" style="opacity:0.9">Client & Staff Training Platform</p>
                </div>
            </header>
            <div class="container" style="padding:32px 24px">
                <div class="tabs">
                    <button type="button" class="tab active" onclick="switchTab('courses')"><span
                            class="material-symbols-outlined" aria-label="School" role="img">school</span>Courses</button>
                    <button type="button" class="tab" onclick="switchTab('students')"><span
                            class="material-symbols-outlined" aria-label="Khách hàng" role="img">people</span>Students</button>
                </div>
                <div class="tab-content active" id="tab-courses">
                    <div class="metrics-grid">
                        <div class="metric-card">
                            <div class="metric-value" id="mCourses">0</div>
                            <div class="metric-label">Total Courses</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-value" id="mPublished">0</div>
                            <div class="metric-label">Published</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-value" id="mStudents">0</div>
                            <div class="metric-label">Students</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-value" id="mEnrollments">0</div>
                            <div class="metric-label">Enrollments</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-value" id="mRating">0</div>
                            <div class="metric-label">Avg Rating</div>
                        </div>
                    </div>
                    <h3 style="margin-bottom:16px">📚 Courses</h3>
                    <div class="course-grid" id="courseGrid"></div>
                </div>
                <div class="tab-content" id="tab-students">
                    <h3 style="margin-bottom:16px">👥 Students</h3>
                    <div class="student-list" id="studentList"></div>
                </div>
            </div>
        </main>
    </div>
    <script type="module" src="/assets/js/lms.js?v=mmp5r1rf"></script>
    <script>
        createDemoLMS(lmsManager);
        function switchTab(id) { document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); event.target.closest('.tab').classList.add('active'); document.getElementById('tab-' + id).classList.add('active') }
        function render() {
            const m = lmsManager.getMetrics();
            document.getElementById('mCourses').textContent = m.totalCourses;
            document.getElementById('mPublished').textContent = m.publishedCourses;
            document.getElementById('mStudents').textContent = m.totalStudents;
            document.getElementById('mEnrollments').textContent = m.totalEnrollments;
            document.getElementById('mRating').textContent = '⭐ ' + m.avgRating;
            document.getElementById('courseGrid').innerHTML = lmsManager.getAllCourses().map(c => { const cat = CourseCategories[c.category]; return `<div class="course-card"><div class="course-img">${cat?.icon || '📚'}</div><div class="course-body"><span class="status-badge status-${c.status}">${c.status}</span><div class="course-title">${c.title}</div><div class="course-meta">${cat?.name || c.category} • ${c.instructor}</div><div class="course-stats"><span class="stat">📖 ${c.getTotalLessons()} lessons</span><span class="stat">⏱️ ${c.duration} min</span><span class="stat">👥 ${c.enrollments}</span></div><div class="course-price">${c.price > 0 ? new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(c.price) : 'Free'}</div></div></div>` }).join('');
            document.getElementById('studentList').innerHTML = lmsManager.getAllStudents().map(s => `<div class="student-item"><div class="student-avatar">${s.name.charAt(0)}</div><div class="student-info"><div class="student-name">${s.name}</div><div class="student-email">${s.email} • ${s.enrolledCourses.length} courses</div></div></div>`).join('');
        }
        render();
    </script>
