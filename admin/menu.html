  <a href="#main" class="skip-link" style="position:absolute;left:-9999px;">Skip to main content</a>
    <div class="layout-2026">
        <sadec-sidebar active="menu"></sadec-sidebar>
        <main class="main-content">
  <main id="main" role="main" class="sr-main">
            <div class="header-section animate-entry delay-1">
                <div>
                    <h1 class="dashboard-title">🍽️ Menu Manager</h1>
                    <p class="text-secondary">Quản lý thực đơn Container Coffee Hub</p>
                </div>
                <div class="flex">
                    <div class="search-glass">
                        <span class="material-symbols-outlined">search</span>
                        <input type="text" placeholder="Tìm món..." id="searchInput" aria-label="Search menu items">
                    </div>
                    <button class="btn-cyber" onclick="MenuManager.exportCSV()" title="Export CSV">
                        <span class="material-symbols-outlined">download</span>
                    </button>
                </div>
            </div>

            <div class="menu-stats animate-entry delay-2">
                <div class="menu-stat-card"><div class="menu-stat-value cyan" id="stat-total">0</div><div class="menu-stat-label">Tổng món</div></div>
                <div class="menu-stat-card"><div class="menu-stat-value lime" id="stat-avail">0</div><div class="menu-stat-label">Đang bán</div></div>
                <div class="menu-stat-card"><div class="menu-stat-value pink" id="stat-avgprice">0₫</div><div class="menu-stat-label">Giá TB</div></div>
                <div class="menu-stat-card"><div class="menu-stat-value gold" id="stat-avgmargin">0%</div><div class="menu-stat-label">Margin TB</div></div>
            </div>

            <div class="menu-toolbar animate-entry delay-3">
                <div class="toolbar-left">
                    <button class="filter-chip active" data-filter="all" onclick="MenuManager.filter('all')">Tất cả</button>
                    <button class="filter-chip" data-filter="coffee" onclick="MenuManager.filter('coffee')">☕ Cà phê</button>
                    <button class="filter-chip" data-filter="tea" onclick="MenuManager.filter('tea')">🍵 Trà</button>
                    <button class="filter-chip" data-filter="blended" onclick="MenuManager.filter('blended')">🧊 Đá Xay</button>
                    <button class="filter-chip" data-filter="snacks" onclick="MenuManager.filter('snacks')">🍰 Snacks</button>
                </div>
                <button class="add-menu-btn" onclick="MenuManager.openModal()">
                    <span class="material-symbols-outlined">add</span> Thêm món mới
                </button>
            </div>

            <div class="menu-table-wrapper animate-entry delay-3">
                <table class="menu-table table-responsive">
                    <thead><tr><th>Món</th><th>Danh mục</th><th>Giá bán</th><th>Giá vốn</th><th>Margin</th><th>Trạng thái</th><th>Thao tác</th></tr></thead>
                    <tbody id="menuTableBody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="menuModal">
        <div class="modal-content">
            <div class="modal-title"><span class="material-symbols-outlined">restaurant_menu</span><span id="modalTitle">Thêm món mới</span></div>
            <form id="menuForm" onsubmit="MenuManager.save(event)">
                <input type="hidden" id="editId">
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Tên món</label><input class="form-input" id="itemName" required="" placeholder="VD: Cà phê sữa đá" aria-label="VD: Cà phê sữa đá"></div>
                    <div class="form-group"><label class="form-label">Emoji</label><input class="form-input" id="itemEmoji" placeholder="☕" maxlength="4" aria-label="☕"></div>
                </div>
                <div class="form-group"><label class="form-label">Danh mục</label>
                    <select class="form-select" id="itemCat" required=""><option value="coffee">☕ Cà phê</option><option value="tea">🍵 Trà</option><option value="blended">🧊 Đá Xay</option><option value="snacks">🍰 Snacks</option></select>
                </div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Giá bán (VND)</label><input class="form-input" type="number" id="itemPrice" required="" min="0" placeholder="45000" aria-label="45000"></div>
                    <div class="form-group"><label class="form-label">Giá vốn (VND)</label><input class="form-input" type="number" id="itemCost" min="0" placeholder="12000" aria-label="12000"></div>
                </div>
                <div class="form-group"><label class="form-label">Công thức</label><textarea class="form-textarea" id="itemRecipe" placeholder="VD: 18g espresso + 30ml sữa"></textarea></div>
                <div class="modal-actions"><button type="button" class="modal-cancel" onclick="MenuManager.closeModal()">Hủy</button><button type="submit" class="modal-save">Lưu</button></div>
            </form>
        </div>
    </div>
