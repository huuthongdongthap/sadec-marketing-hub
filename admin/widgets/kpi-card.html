<body>
    <div class="widget-demo-container">
        <h1>KPI Card Widget Demo</h1>
        <p>Custom Element: &lt;kpi-card-widget&gt;</p>

        <div class="widget-showcase">
            <!-- Revenue KPI -->
            <kpi-card-widget
                title="Total Revenue"
                value="125,000,000đ"
                trend="positive"
                trend-value="+12.5%"
                icon="payments"
                color="green"
                sparkline-data="10,25,18,30,22,35,28">
            </kpi-card-widget>

            <!-- Clients KPI -->
            <kpi-card-widget
                title="Active Clients"
                value="47"
                trend="positive"
                trend-value="+8 new"
                icon="group"
                color="cyan"
                sparkline-data="5,8,12,15,20,25,30">
            </kpi-card-widget>

            <!-- Leads KPI -->
            <kpi-card-widget
                title="Total Leads"
                value="234"
                trend="positive"
                trend-value="+18%"
                icon="ads_click"
                color="purple"
                sparkline-data="15,20,18,25,30,28,35">
            </kpi-card-widget>

            <!-- Campaigns KPI -->
            <kpi-card-widget
                title="Active Campaigns"
                value="12"
                trend="neutral"
                trend-value="Stable"
                icon="bolt"
                color="orange"
                sparkline-data="8,9,10,10,11,12,12">
            </kpi-card-widget>
        </div>
    </div>
