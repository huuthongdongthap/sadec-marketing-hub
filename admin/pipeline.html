<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <!-- Sidebar - Using Web Component -->
        <sadec-sidebar active="pipeline"></sadec-sidebar>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <div>
                    <h1 class="page-title" style="font-size: 24px; margin: 0;">🎯 Sales Pipeline</h1>
                    <div class="body-medium text-muted">Quản lý deals qua các giai đoạn bán hàng</div>
                </div>
                <div class="toolbar">
                    <div class="live-indicator">
                        <span class="live-dot"></span>
                        <span>LIVE</span>
                    </div>
                    <button class="btn btn-outlined" id="exportBtn">
                        <span class="material-symbols-outlined">download</span>
                        Xuất báo cáo
                    </button>
                    <button class="btn btn-filled" id="addDealBtn">
                        <span class="material-symbols-outlined">add</span>
                        Thêm Deal
                    </button>
                </div>
            </div>

            <!-- Pipeline Stats -->
            <div class="pipeline-stats">
                <div class="stat-pill">
                    <div class="stat-pill-value" id="totalDeals">0</div>
                    <div class="stat-pill-label">Tổng deals</div>
                </div>
                <div class="stat-pill">
                    <div class="stat-pill-value" id="totalValue">0đ</div>
                    <div class="stat-pill-label">Giá trị pipeline</div>
                </div>
                <div class="stat-pill">
                    <div class="stat-pill-value" id="avgScore">0</div>
                    <div class="stat-pill-label">Score TB</div>
                </div>
                <div class="stat-pill">
                    <div class="stat-pill-value" id="winRate">0%</div>
                    <div class="stat-pill-label">Tỷ lệ chốt</div>
                </div>
            </div>

            <!-- Revenue Forecast Mini Chart -->
            <div class="forecast-chart"
                style="background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 16px; padding: 20px; margin-bottom: 32px; border: 1px solid rgba(255,255,255,0.1);">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <div style="color: #fff; font-size: 14px;">📈 Dự báo doanh thu Q1/2026</div>
                    <div style="color: #00E676; font-size: 20px; font-weight: 700;">750Mđ</div>
                </div>
                <div style="display: flex; align-items: flex-end; gap: 8px; height: 60px;">
                    <div
                        style="flex: 1; background: linear-gradient(180deg, #00E676, #00BFA5); border-radius: 4px; height: 40%; opacity: 0.6;">
                    </div>
                    <div
                        style="flex: 1; background: linear-gradient(180deg, #00E676, #00BFA5); border-radius: 4px; height: 55%; opacity: 0.7;">
                    </div>
                    <div
                        style="flex: 1; background: linear-gradient(180deg, #00E676, #00BFA5); border-radius: 4px; height: 70%; opacity: 0.8;">
                    </div>
                    <div
                        style="flex: 1; background: linear-gradient(180deg, #00E676, #00BFA5); border-radius: 4px; height: 60%; opacity: 0.75;">
                    </div>
                    <div
                        style="flex: 1; background: linear-gradient(180deg, #00E676, #00BFA5); border-radius: 4px; height: 85%; opacity: 0.85;">
                    </div>
                    <div
                        style="flex: 1; background: linear-gradient(180deg, #00E676, #00BFA5); border-radius: 4px; height: 100%; box-shadow: 0 0 20px rgba(0,230,118,0.5);">
                    </div>
                </div>
                <div
                    style="display: flex; justify-content: space-between; color: rgba(255,255,255,0.5); font-size: 10px; margin-top: 8px;">
                    <span>T8</span><span>T9</span><span>T10</span><span>T11</span><span>T12</span><span>T1</span>
                </div>
            </div>

            <!-- Kanban Board -->
            <div class="pipeline-board" id="pipelineBoard">
                <!-- Lead Stage -->
                <div class="pipeline-stage" data-stage="lead">
                    <div class="stage-header">
                        <div class="stage-title">
                            <div class="stage-icon lead">
                                <span class="material-symbols-outlined">person_add</span>
                            </div>
                            Lead
                        </div>
                        <span class="stage-count" data-count>0</span>
                    </div>
                    <div class="stage-value" data-value>0đ</div>
                    <div class="stage-cards" data-cards></div>
                </div>

                <!-- Qualified Stage -->
                <div class="pipeline-stage" data-stage="qualified">
                    <div class="stage-header">
                        <div class="stage-title">
                            <div class="stage-icon qualified">
                                <span class="material-symbols-outlined">verified</span>
                            </div>
                            Qualified
                        </div>
                        <span class="stage-count" data-count>0</span>
                    </div>
                    <div class="stage-value" data-value>0đ</div>
                    <div class="stage-cards" data-cards></div>
                </div>

                <!-- Proposal Stage -->
                <div class="pipeline-stage" data-stage="proposal">
                    <div class="stage-header">
                        <div class="stage-title">
                            <div class="stage-icon proposal">
                                <span class="material-symbols-outlined">description</span>
                            </div>
                            Proposal
                        </div>
                        <span class="stage-count" data-count>0</span>
                    </div>
                    <div class="stage-value" data-value>0đ</div>
                    <div class="stage-cards" data-cards></div>
                </div>

                <!-- Negotiation Stage -->
                <div class="pipeline-stage" data-stage="negotiation">
                    <div class="stage-header">
                        <div class="stage-title">
                            <div class="stage-icon negotiation">
                                <span class="material-symbols-outlined">handshake</span>
                            </div>
                            Negotiation
                        </div>
                        <span class="stage-count" data-count>0</span>
                    </div>
                    <div class="stage-value" data-value>0đ</div>
                    <div class="stage-cards" data-cards></div>
                </div>

                <!-- Closed Stage -->
                <div class="pipeline-stage" data-stage="closed">
                    <div class="stage-header">
                        <div class="stage-title">
                            <div class="stage-icon closed">
                                <span class="material-symbols-outlined">emoji_events</span>
                            </div>
                            Closed Won
                        </div>
                        <span class="stage-count" data-count>0</span>
                    </div>
                    <div class="stage-value" data-value>0đ</div>
                    <div class="stage-cards" data-cards></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Particles Container -->
    <div class="particles" id="particles"></div>

    <!-- Pipeline Script -->
    <script type="module" src="/assets/js/pipeline-client.js"></script>

    <!-- Particles Generator -->
    <script>
        // Create floating particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = (10 + Math.random() * 10) + 's';
            particlesContainer.appendChild(particle);
        }
    </script>
