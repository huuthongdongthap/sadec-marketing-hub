<body>
    <div class="layout-2026">
        <!-- Sidebar - Using Web Component -->
        <sadec-sidebar active="dashboard"></sadec-sidebar>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <div class="header-section animate-entry delay-1">
                <div>
                    <h1 class="dashboard-title">Dashboard Overview</h1>
                    <p class="text-secondary">Welcome back, Commander.</p>
                </div>

                <div class="flex">
                    <div class="search-glass">
                        <span class="material-symbols-outlined">search</span>
                        <input type="text" placeholder="Search system..." aria-label="Search system">
                    </div>
                    <button class="btn-cyber" id="notify-toggle" onclick="window.Notifications.requestPermission()"
                        title="Enable Notifications">
                        <span class="material-symbols-outlined">notifications</span>
                    </button>
                    <button class="btn-cyber" onclick="MekongAdmin.ThemeManager.toggle()" title="Toggle Theme">
                        <span class="material-symbols-outlined">dark_mode</span>
                    </button>
                    <a href="javascript:void(0)" class="btn-cyber">
                        <span class="material-symbols-outlined">add</span> NEW PROJECT
                    </a>
                </div>
            </div>

            <!-- Stats Row 1 - Using KPI Card Widgets -->
            <div class="stats-grid animate-entry-premium delay-2">
                <!-- Stat 1: Revenue -->
                <kpi-card-widget
                    title="Total Revenue"
                    value="125,000,000đ"
                    trend="positive"
                    trend-value="+12.5%"
                    icon="payments"
                    color="green"
                    sparkline-data="10,25,18,30,22,35,28"
                    id="kpi-revenue">
                </kpi-card-widget>

                <!-- Stat 2: Clients -->
                <kpi-card-widget
                    title="Active Clients"
                    value="47"
                    trend="positive"
                    trend-value="+8 new"
                    icon="group"
                    color="cyan"
                    sparkline-data="5,8,12,15,20,25,30"
                    id="kpi-clients">
                </kpi-card-widget>

                <!-- Stat 3: Leads -->
                <kpi-card-widget
                    title="Total Leads"
                    value="234"
                    trend="positive"
                    trend-value="+18%"
                    icon="ads_click"
                    color="purple"
                    sparkline-data="15,20,18,25,30,28,35"
                    id="kpi-leads">
                </kpi-card-widget>

                <!-- Stat 4: Campaign Rate -->
                <kpi-card-widget
                    title="Active Campaigns"
                    value="12"
                    trend="positive"
                    trend-value="100%"
                    icon="bolt"
                    color="orange"
                    sparkline-data="8,9,10,10,11,12,12"
                    id="kpi-campaigns">
                </kpi-card-widget>
            </div>

            <!-- Stats Row 2 - Additional KPIs -->
            <div class="stats-grid animate-entry-premium delay-2" style="margin-top: 16px;">
                <!-- Stat 5: Conversion Rate -->
                <kpi-card-widget
                    title="Conversion Rate"
                    value="3.24%"
                    trend="positive"
                    trend-value="+0.4%"
                    icon="funnel"
                    color="lime"
                    sparkline-data="2.1,2.4,2.8,2.6,3.0,2.9,3.24"
                    id="kpi-conversion">
                </kpi-card-widget>

                <!-- Stat 6: Orders Today -->
                <kpi-card-widget
                    title="Orders Today"
                    value="89"
                    trend="positive"
                    trend-value="+23%"
                    icon="shopping_cart"
                    color="red"
                    sparkline-data="45,52,48,60,55,70,89"
                    id="kpi-orders">
                </kpi-card-widget>

                <!-- Stat 7: Page Speed -->
                <kpi-card-widget
                    title="Page Speed Score"
                    value="94"
                    trend="positive"
                    trend-value="+5 pts"
                    icon="speed"
                    color="cyan"
                    sparkline-data="78,82,85,88,90,92,94"
                    id="kpi-speed">
                </kpi-card-widget>

                <!-- Stat 8: System Health -->
                <kpi-card-widget
                    title="System Health"
                    value="99.9%"
                    trend="neutral"
                    trend-value="Stable"
                    icon="health_and_safety"
                    color="green"
                    sparkline-data="99,99.5,99.8,99.9,99.9,99.9,99.9"
                    id="kpi-health">
                </kpi-card-widget>
            </div>

            <!-- Content Area - Using Dashboard Widgets -->
            <div class="chart-section animate-entry delay-3">
                <!-- Revenue Chart Widget -->
                <line-chart-widget
                    title="Revenue Trend"
                    data-type="revenue"
                    time-range="weekly"
                    id="revenue-chart">
                </line-chart-widget>

                <!-- Traffic Chart -->
                <area-chart-widget
                    title="Traffic Sources"
                    series='[{"name":"Direct","data":[30,40,35,45,50,55,60]},{"name":"Organic","data":[50,60,55,70,75,80,85]}]'
                    labels='["Mon","Tue","Wed","Thu","Fri","Sat","Sun"]'
                    colors='["#00e5ff","#c6ff00"]'
                    opacity="0.3"
                    id="traffic-chart">
                </area-chart-widget>
            </div>

            <!-- Charts Row 2 -->
            <div class="chart-section animate-entry delay-4" style="margin-top: 20px;">
                <!-- Sales by Category Bar Chart -->
                <bar-chart-widget
                    title="Sales by Category"
                    data='[65,59,80,81,56,55,45,60,75,70,85,90]'
                    labels='["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]'
                    colors='["#00e5ff","#d500f9"]'
                    show-values="true"
                    id="sales-chart">
                </bar-chart-widget>

                <!-- Device Distribution Pie Chart -->
                <pie-chart-widget
                    title="Device Distribution"
                    data='[{"label":"Desktop","value":45,"color":"#00e5ff"},{"label":"Mobile","value":35,"color":"#d500f9"},{"label":"Tablet","value":20,"color":"#c6ff00"}]'
                    donut="true"
                    show-legend="true"
                    show-percentages="true"
                    size="220"
                    id="device-chart">
                </pie-chart-widget>
            </div>

            <!-- Alerts + Activity Row -->
            <div class="chart-section animate-entry delay-5" style="margin-top: 20px;">
                <!-- System Alerts Widget -->
                <alerts-widget
                    title="System Alerts"
                    max-items="6"
                    filter="all"
                    auto-dismiss="60"
                    id="system-alerts">
                </alerts-widget>

                <!-- Live Activity Feed -->
                <activity-feed-widget
                    title="Live Activity"
                    max-items="8"
                    id="activity-feed">
                </activity-feed-widget>
            </div>

            <!-- Project Progress Widget -->
            <div class="chart-section animate-entry delay-4" style="margin-top: 20px;">
                <project-progress-widget title="Active Projects" status="active" id="project-progress"></project-progress-widget>
            </div>

            <!-- F&B Quick Stats -->
            <div class="chart-section animate-entry delay-4" style="margin-top: 20px;">
                <div class="glass-card" style="padding: 24px;">
                    <div class="flex-between mb-24">
                        <h2 class="title-large" style="font-size: 20px;">☕ Container Coffee Hub</h2>
                        <a href="pos.html" class="btn-cyber" style="padding: 5px 15px; font-size: 12px;">Mở POS →</a>
                    </div>
                    <div class="stats-grid" style="grid-template-columns: repeat(4, 1fr); gap: 12px;">
                        <div style="background: rgba(255,255,255,0.05); border-radius: 12px; padding: 14px; text-align: center;">
                            <div style="font-size: 20px; font-weight: 700; color: #00e5ff;">0</div>
                            <div style="font-size: 11px; color: rgba(255,255,255,0.5); text-transform: uppercase;">Đơn hôm nay</div>
                        </div>
                        <div style="background: rgba(255,255,255,0.05); border-radius: 12px; padding: 14px; text-align: center;">
                            <div style="font-size: 20px; font-weight: 700; color: #76ff03;">0₫</div>
                            <div style="font-size: 11px; color: rgba(255,255,255,0.5); text-transform: uppercase;">Doanh thu F&B</div>
                        </div>
                        <div style="background: rgba(255,255,255,0.05); border-radius: 12px; padding: 14px; text-align: center;">
                            <div style="font-size: 20px; font-weight: 700; color: #ff6ec7;">26</div>
                            <div style="font-size: 11px; color: rgba(255,255,255,0.5); text-transform: uppercase;">Menu Items</div>
                        </div>
                        <div style="background: rgba(255,255,255,0.05); border-radius: 12px; padding: 14px; text-align: center;">
                            <div style="font-size: 20px; font-weight: 700; color: #ffd600;">100%</div>
                            <div style="font-size: 11px; color: rgba(255,255,255,0.5); text-transform: uppercase;">ATTP Score</div>
                        </div>
                    </div>
                    <div style="margin-top: 16px; display: flex; gap: 8px; flex-wrap: wrap;">
                        <a href="menu.html" style="padding: 6px 14px; border-radius: 8px; background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7); text-decoration: none; font-size: 12px;">🍽️ Menu</a>
                        <a href="inventory.html" style="padding: 6px 14px; border-radius: 8px; background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7); text-decoration: none; font-size: 12px;">📦 Tồn kho</a>
                        <a href="shifts.html" style="padding: 6px 14px; border-radius: 8px; background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7); text-decoration: none; font-size: 12px;">📅 Ca làm</a>
                        <a href="quality.html" style="padding: 6px 14px; border-radius: 8px; background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7); text-decoration: none; font-size: 12px;">✅ ATTP</a>
                        <a href="suppliers.html" style="padding: 6px 14px; border-radius: 8px; background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7); text-decoration: none; font-size: 12px;">🚛 NCC</a>
                        <a href="loyalty.html" style="padding: 6px 14px; border-radius: 8px; background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7); text-decoration: none; font-size: 12px;">🎁 Loyalty</a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="widgets/activity-feed.js"></script>
    <script type="module" src="widgets/project-progress.js"></script>

    <script type="module" src="widgets/pie-chart-widget.js"></script>

    <script type="module" src="widgets/alerts-widget.js"></script>
    <script>
        // Initialize Chart.js after DOM load
        document.addEventListener('DOMContentLoaded', async () => {
            // Initialize Live Data
            if (window.MekongAdmin && window.SupabaseAPI) {
                MekongAdmin.LiveData.init(SupabaseAPI.getClient());
            }

            if (window.MekongAdmin && MekongAdmin.DashboardCharts) {
                await MekongAdmin.DashboardCharts.init();
                if (MekongAdmin.Toast) {
                    MekongAdmin.Toast.success('Dashboard loaded successfully!');
                }
            }

            // Initialize Dashboard Widgets
            window.addEventListener('DOMContentLoaded', () => {
                // Update KPI widgets with real data
                if (window.MekongAdmin && MekongAdmin.Dashboard) {
                    MekongAdmin.Dashboard.load().then(stats => {
                        const revenueKpi = document.getElementById('kpi-revenue');
                        const clientsKpi = document.getElementById('kpi-clients');
                        const leadsKpi = document.getElementById('kpi-leads');
                        const campaignsKpi = document.getElementById('kpi-campaigns');

                        if (revenueKpi) revenueKpi.setAttribute('value', stats.pending_revenue || 0);
                        if (clientsKpi) clientsKpi.setAttribute('value', stats.total_customers || 0);
                        if (leadsKpi) leadsKpi.setAttribute('value', stats.total_leads || 0);
                        if (campaignsKpi) campaignsKpi.setAttribute('value', stats.active_campaigns || 0);
                    });
                }
            });
        });
    </script>
