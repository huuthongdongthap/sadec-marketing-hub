<body>
  <a href="#main" class="skip-link" style="position:absolute;left:-9999px;" aria-label="Skip to main content">Skip to main content</a>
    <main role="main" class="main-content">
  <main id="main" role="main" class="sr-main">
    <!-- Header -->
    <header class="builder-header">
        <div style="display: flex; align-items: center; gap: 16px;">
            <a href="dashboard.html" class="btn-icon" aria-label="Quay lại"
                <span class="material-symbols-outlined" aria-label="Quay lại" role="img">arrow_back</span>
            </a>
            <div contenteditable="true" style="font-weight: 700; font-size: 18px; padding: 4px 8px; border: 1px dashed transparent; border-radius: 4px;">
                Untitled Landing Page
            </div>
        </div>

        <div class="device-toggles">
            <button type="button" class="device-btn active" onclick="setDevice('desktop')" aria-label="Desktop Windows"
                <span class="material-symbols-outlined" aria-label="Desktop Windows" role="img">desktop_windows</span>
            </button>
            <button type="button" class="device-btn" onclick="setDevice('tablet')" aria-label="Tablet Mac"
                <span class="material-symbols-outlined" aria-label="Tablet Mac" role="img">tablet_mac</span>
            </button>
            <button type="button" class="device-btn" onclick="setDevice('mobile')" aria-label="Smartphone"
                <span class="material-symbols-outlined" aria-label="Smartphone" role="img">smartphone</span>
            </button>
        </div>

        <div style="display: flex; gap: 8px;">
            <button type="button" class="btn btn-outlined">Preview</button>
            <button type="button" class="btn btn-filled">Publish</button>
        </div>
    </header>

    <div class="builder-layout">
        <!-- Left Panel: Blocks -->
        <div class="blocks-panel">
            <div class="block-category">
                <div class="block-category-title">Basic</div>
                <div class="block-grid">
                    <div class="block-item" draggable="true" ondragstart="drag(event)" data-type="hero">
                        <span class="material-symbols-outlined block-icon" aria-label="Web Asset" role="img">web_asset</span>
                        <span class="block-name">Hero Section</span>
                    </div>
                    <div class="block-item" draggable="true" ondragstart="drag(event)" data-type="features">
                        <span class="material-symbols-outlined block-icon" aria-label="Xem dạng lưới" role="img">grid_view</span>
                        <span class="block-name">Features</span>
                    </div>
                    <div class="block-item" draggable="true" ondragstart="drag(event)" data-type="content">
                        <span class="material-symbols-outlined block-icon" aria-label="Article" role="img">article</span>
                        <span class="block-name">Content</span>
                    </div>
                </div>
            </div>

            <div class="block-category">
                <div class="block-category-title">Conversion</div>
                <div class="block-grid">
                    <div class="block-item" draggable="true" ondragstart="drag(event)" data-type="form">
                        <span class="material-symbols-outlined block-icon" aria-label="Contact Page" role="img">contact_page</span>
                        <span class="block-name">Lead Form</span>
                    </div>
                    <div class="block-item" draggable="true" ondragstart="drag(event)" data-type="cta">
                        <span class="material-symbols-outlined block-icon" aria-label="Call To Action" role="img">call_to_action</span>
                        <span class="block-name">Call to Action</span>
                    </div>
                    <div class="block-item" draggable="true" ondragstart="drag(event)" data-type="testimonials">
                        <span class="material-symbols-outlined block-icon" aria-label="Format Quote" role="img">format_quote</span>
                        <span class="block-name">Testimonials</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Center: Canvas -->
        <div class="canvas-area">
            <div id="canvas" class="canvas desktop" ondrop="drop(event)" ondragover="allowDrop(event)">
                <!-- Blocks will be dropped here -->
                <div style="padding: 40px; text-align: center; color: #999; border: 2px dashed #ddd; margin: 20px;">
                    Kéo thả blocks vào đây
                </div>
            </div>
        </div>

        <!-- Right Panel: Properties -->
        <div class="properties-panel">
            <div class="block-category-title">Settings</div>

            <div class="prop-group">
                <label class="prop-label">Page Title</label>
                <input type="text" class="prop-input" value="Khuyến mãi Tết 2026" aria-label="Enter text value">
            </div>

            <div class="prop-group">
                <label class="prop-label">Slug</label>
                <input type="text" class="prop-input" value="khuyen-mai-tet-2026" aria-label="Enter text value">
            </div>

            <div class="prop-group">
                <label class="prop-label">Theme Color</label>
                <input type="color" class="prop-input" value="#006A60" style="height: 40px;" aria-label="Enter color value">
            </div>

            <div id="block-properties" style="display: none; border-top: 1px solid #ddd; padding-top: 20px;">
                <div class="block-category-title">Block Properties</div>
                <div class="prop-group">
                    <label class="prop-label">Heading</label>
                    <input type="text" class="prop-input" id="prop-heading" aria-label="prop heading">
                </div>
                <div class="prop-group">
                    <label class="prop-label">Subtext</label>
                    <textarea class="prop-input" rows="3" id="prop-subtext"></textarea>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Drag and Drop Logic
        function allowDrop(ev) {
            ev.preventDefault();
        }

        function drag(ev) {
            ev.dataTransfer.setData("type", ev.target.dataset.type);
        }

        function drop(ev) {
            ev.preventDefault();
            const type = ev.dataTransfer.getData("type");
            addBlock(type);
        }

        function addBlock(type) {
            const canvas = document.getElementById('canvas');

            // Remove empty placeholder if exists
            if (canvas.children[0] && canvas.children[0].textContent.includes('Kéo thả')) {
                canvas.innerHTML = '';
            }

            const block = document.createElement('div');
            block.className = 'canvas-block';
            block.onclick = (e) => selectBlock(e, block);

            // Generate Block Content based on Type
            block.innerHTML = getBlockTemplate(type);

            canvas.appendChild(block);
        }

        function selectBlock(e, block) {
            e.stopPropagation();
            document.querySelectorAll('.canvas-block').forEach(b => b.classList.remove('selected'));
            block.classList.add('selected');
            document.getElementById('block-properties').style.display = 'block';

            // Bind properties (mock)
            const heading = block.querySelector('h1, h2, h3');
            if(heading) document.getElementById('prop-heading').value = heading.innerText;
        }

        function getBlockTemplate(type) {
            const actions = `
                <div class="block-actions">
                    <button type="button" class="btn-icon small" aria-label="Lên trên"<span class="material-symbols-outlined" aria-label="Lên trên" role="img">arrow_upward</span></button>
                    <button type="button" class="btn-icon small" aria-label="Xuống dưới"<span class="material-symbols-outlined" aria-label="Xuống dưới" role="img">arrow_downward</span></button>
                    <button type="button" class="btn-icon small" onclick="this.closest('.canvas-block').remove()" aria-label="Xóa"<span class="material-symbols-outlined" aria-label="Xóa" role="img">delete</span></button>
                </div>
            `;

            switch(type) {
                case 'hero':
                    return `
                        ${actions}
                        <div style="text-align: center; padding: 40px 20px; background: #f8f9fa;">
                            <h1 style="font-size: 32px; margin-bottom: 16px; color: #333;">Tiêu đề chính ấn tượng</h1>
                            <p style="font-size: 18px; color: #666; max-width: 600px; margin: 0 auto 24px;">Mô tả ngắn gọn về giá trị sản phẩm/dịch vụ của bạn tại đây.</p>
                            <button type="button" class="btn btn-filled">Đăng ký ngay</button>
                        </div>
                    `;
                case 'features':
                    return `
                        ${actions}
                        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 20px;">
                            <div style="text-align: center;">
                                <div style="font-size: 32px; color: var(--md-sys-color-primary);">★</div>
                                <h3>Tính năng 1</h3>
                                <p>Mô tả tính năng</p>
                            </div>
                            <div style="text-align: center;">
                                <div style="font-size: 32px; color: var(--md-sys-color-primary);">★</div>
                                <h3>Tính năng 2</h3>
                                <p>Mô tả tính năng</p>
                            </div>
                            <div style="text-align: center;">
                                <div style="font-size: 32px; color: var(--md-sys-color-primary);">★</div>
                                <h3>Tính năng 3</h3>
                                <p>Mô tả tính năng</p>
                            </div>
                        </div>
                    `;
                case 'form':
                    return `
                        ${actions}
                        <div style="max-width: 400px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; background: white;">
                            <h3 style="text-align: center; margin-bottom: 16px;">Đăng ký tư vấn</h3>
                            <input type="text" placeholder="Họ tên" style="width: 100%; padding: 8px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 4px;" aria-label="Họ tên">
                            <input type="text" placeholder="Số điện thoại" style="width: 100%; padding: 8px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 4px;" aria-label="Số điện thoại">
                            <button type="button" class="btn btn-filled" style="width: 100%;">Gửi thông tin</button>
                        </div>
                    `;
                default:
                    return `${actions}<div>Block content placeholder</div>`;
            }
        }

        function setDevice(device) {
            document.querySelectorAll('.device-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');

            const canvas = document.getElementById('canvas');
            canvas.className = `canvas ${device}`;
        }
    </script>
