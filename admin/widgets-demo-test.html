<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Widgets Demo - Sa Đéc Marketing Hub</title>
  <style>
    body {
      background: #0a0a14;
      color: #ffffff;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 24px;
      margin: 0;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    h1 { font-size: 32px; margin-bottom: 8px; color: #00e5ff; }
    .subtitle { color: rgba(255,255,255,0.6); margin-bottom: 40px; }
    .section { margin-bottom: 48px; }
    .section-title { font-size: 20px; font-weight: 600; margin-bottom: 24px; color: rgba(255,255,255,0.9); }
    .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; }
    .btn-group { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 20px; }
    button {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
    .btn-primary { background: linear-gradient(135deg, #00e5ff, #00b8d4); color: #000; }
    .btn-success { background: linear-gradient(135deg, #00e676, #00c853); color: #000; }
    .btn-warning { background: linear-gradient(135deg, #ff9100, #ff6d00); color: #000; }
    .btn-error { background: linear-gradient(135deg, #ff1744, #d50000); color: #fff; }
    .chart-wrapper { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 24px; }
    /* Toast styles */
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 16px 24px;
      border-radius: 8px;
      color: #fff;
      font-weight: 500;
      z-index: 9999;
      animation: slideIn 0.3s ease;
    }
    .toast-success { background: #00e676; }
    .toast-error { background: #ff1744; }
    .toast-warning { background: #ff9100; }
    .toast-info { background: #00e5ff; color: #000; }
    @keyframes slideIn {
      from { transform: translateX(400px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    /* Loading overlay */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9998;
    }
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #00e5ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* Skeleton */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
      height: 100px;
    }
    .skeleton-card { height: 150px; border-radius: 16px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body>
  <div class="container">
    <main id="main" role="main">
      <h1>Dashboard Widgets</h1>
      <p class="subtitle">Sa Đéc Marketing Hub - Component Library</p>

      <section class="section">
        <h2 class="section-title">KPI Cards</h2>
        <div class="dashboard-grid">
          <kpi-card-widget title="Doanh Thu" value="125.5M" trend="positive" trend-value="+12.5%" icon="payments" color="cyan" sparkline-data="10,25,18,30,22,35,28"></kpi-card-widget>
          <kpi-card-widget title="Khách Hàng" value="1,248" trend="positive" trend-value="+8.2%" icon="people" color="purple" sparkline-data="5,15,12,25,20,40,35"></kpi-card-widget>
          <kpi-card-widget title="Tỉ Lệ Chuyển Đổi" value="3.24%" trend="negative" trend-value="-2.1%" icon="conversion_path" color="orange" sparkline-data="15,20,18,22,19,25,20"></kpi-card-widget>
          <kpi-card-widget title="Chi Phí Marketing" value="45.2M" trend="neutral" trend-value="0.0%" icon="analytics" color="red" sparkline-data="20,22,21,23,22,24,23"></kpi-card-widget>
        </div>
      </section>

      <section class="section">
        <h2 class="section-title">Alert System</h2>
        <div class="btn-group">
          <button type="button" class="btn-success" onclick="Alert.success('Thành công', 'Dữ liệu đã được lưu!')">✅ Alert Thành Công</button>
          <button type="button" class="btn-error" onclick="Alert.error('Lỗi', 'Có lỗi xảy ra khi xử lý!')">❌ Alert Lỗi</button>
          <button type="button" class="btn-warning" onclick="Alert.warning('Cảnh báo', 'Dữ liệu sắp hết hạn!')">⚠️ Alert Cảnh Báo</button>
          <button type="button" class="btn-primary" onclick="Alert.info('Thông báo', 'Cập nhật mới available!')">ℹ️ Alert Thông Tin</button>
        </div>
      </section>

      <section class="section">
        <h2 class="section-title">Loading States</h2>
        <div class="btn-group">
          <button type="button" class="btn-primary" onclick="Loading.fullscreen.show('Đang xử lý...')">Show Fullscreen Loading</button>
          <button type="button" class="btn-success" onclick="Loading.fullscreen.hide()">Hide Fullscreen Loading</button>
          <button type="button" class="btn-warning" onclick="showSkeletonDemo()">Show Skeleton Demo</button>
        </div>
        <div id="skeleton-demo" style="margin-top: 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;"></div>
      </section>
    </main>
  </div>

  <script type="module">
    import './widgets/kpi-card.js';
    import './widgets/bar-chart.js';
    import './widgets/line-chart-widget.js';
    import './widgets/pie-chart-widget.js';
    import './widgets/alerts-widget.js';

    window.Alert = AlertHelper;
    window.Loading = LoadingHelper;
  </script>

  <script>
    const AlertHelper = {
      success: (title, message) => {
        const toast = document.createElement('div');
        toast.className = 'toast toast-success';
        toast.innerHTML = `<strong>${title}</strong><p>${message}</p>`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
      },
      error: (title, message) => {
        const toast = document.createElement('div');
        toast.className = 'toast toast-error';
        toast.innerHTML = `<strong>${title}</strong><p>${message}</p>`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
      },
      warning: (title, message) => {
        const toast = document.createElement('div');
        toast.className = 'toast toast-warning';
        toast.innerHTML = `<strong>${title}</strong><p>${message}</p>`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
      },
      info: (title, message) => {
        const toast = document.createElement('div');
        toast.className = 'toast toast-info';
        toast.innerHTML = `<strong>${title}</strong><p>${message}</p>`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
      }
    };

    const LoadingHelper = {
      fullscreen: {
        show: (message) => {
          const overlay = document.createElement('div');
          overlay.id = 'loading-overlay';
          overlay.innerHTML = `<div class="loading-spinner"><p>${message || 'Đang xử lý...'}</p></div>`;
          document.body.appendChild(overlay);
        },
        hide: () => {
          const overlay = document.getElementById('loading-overlay');
          if (overlay) overlay.remove();
        }
      }
    };

    function showSkeletonDemo() {
      const container = document.getElementById('skeleton-demo');
      container.innerHTML = '<div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div>';
      setTimeout(() => { container.innerHTML = ''; }, 3000);
    }
  </script>
</body>
</html>
